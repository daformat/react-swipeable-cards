name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below as completely as you can — the more detail you provide, the faster we can triage and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the issue.
      placeholder: |
        1. Render `<Carousel.Root>` with `scrollSnapType="x mandatory"`
        2. Click `<Carousel.NextPage>`
        3. …
    validations:
      required: true

  - type: input
    id: reproduction-link
    attributes:
      label: Reproduction link
      description: "A minimal reproduction is the fastest path to a fix. Please share a link to a CodeSandbox, StackBlitz, or a public repo that demonstrates the issue."
      placeholder: https://codesandbox.io/…
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: "1.0.8"
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: "18.3.1"
    validations:
      required: true

  - type: checkboxes
    id: browsers
    attributes:
      label: Affected browsers / environments
      options:
        - label: Chrome / Chromium
        - label: Firefox
        - label: Safari / WebKit
        - label: Mobile Safari (iOS)
        - label: Chrome for Android
        - label: Other (describe below)

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, videos, related issues, etc.
    validations:
      required: false
